<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recent - Founder's Stories</title>
  <link rel="stylesheet" href="blog.css">
</head>
<body>
  <div class="page-background">
    <!-- Header Section -->
    <header class="header">
      <div class="header-content">
        <div class="header-flex">
          <div>
            <h1 class="header-title">Founder's Stories</h1>
            <p class="header-subtitle">Real journeys from our campus entrepreneurs</p>
          </div>
          
          <!-- Filter Buttons -->
          <div class="filter-buttons">
            <button class="filter-btn" onclick="window.location.href='blog.html'">
              All Stories
            </button>
            <button class="filter-btn" onclick="window.location.href='trending.html'">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline>
                <polyline points="17 6 23 6 23 12"></polyline>
              </svg>
              Trending
            </button>
            <button class="filter-btn active" onclick="window.location.href='recent.html'">
              Recent
            </button>
          </div>
        </div>
      </div>
    </header>

    <!-- Main Content - Blog Grid -->
    <main class="main-content">
      <div class="blog-grid" id="blogGrid">
        <!-- Blog cards will be inserted here by JavaScript -->
      </div>
    </main>

    <!-- Blog Detail Modal -->
    <div class="modal-overlay" id="blogModal" style="display: none;">
      <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-header">
          <img src="" alt="" class="modal-header-image" id="modalImage">
          <button class="close-btn" onclick="closeModal()">✕</button>
          
          <div class="modal-header-overlay">
            <h1 class="modal-title" id="modalTitle"></h1>
            <div class="modal-founder-info">
              <img src="" alt="" class="modal-founder-avatar" id="modalFounderImage">
              <div>
                <h3 class="modal-founder-name" id="modalFounderName"></h3>
                <p class="modal-founder-details" id="modalFounderDetails"></p>
              </div>
            </div>
          </div>
        </div>

        <div class="modal-body">
          <p class="modal-text" id="modalContent"></p>

          <div class="engagement-stats">
            <div class="stat-item">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2">
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
              </svg>
              <div>
                <p class="stat-number" id="modalLikes"></p>
                <p class="stat-label">Likes</p>
              </div>
            </div>
            <div class="stat-item">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2">
                <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
              </svg>
              <div>
                <p class="stat-number" id="modalComments"></p>
                <p class="stat-label">Comments</p>
              </div>
            </div>
          </div>

          <div class="comment-section">
            <h3 class="comment-title">Share Your Thoughts</h3>
            <div class="comment-input-container">
              <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Student" alt="Your avatar" class="comment-avatar">
              <div class="comment-input-wrapper">
                <textarea id="commentInput" placeholder="Add a comment..." class="comment-textarea" rows="3"></textarea>
                <button onclick="addComment()" class="comment-submit-btn">
                  Post Comment
                </button>
              </div>
            </div>
            <div class="comments-list"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    // Load recent blogs on page load
    document.addEventListener('DOMContentLoaded', function() {
      loadBlogs('recent');
    });
  </script>
</body>
</html>
